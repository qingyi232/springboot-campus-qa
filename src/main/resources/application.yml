server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: campus-intelligent-qa-system
  
  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_qa_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      
  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

# 文件上传路径配置
file:
  upload-dir: uploads/avatars

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.campus.qa.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: campus-qa-system-secret-key-2025
  expiration: 604800  # 7天 (秒)
  header: Authorization
  prefix: Bearer 

# Rasa配置
rasa:
  api-url: http://localhost:5005
  webhook-url: /webhooks/rest/webhook
  model-train-url: /model/train
  timeout: 30000  # 30秒

# DeepSeek AI配置
deepseek:
  api-key: sk-3b30d9ad425d450ba28d54324d98450a
  api-url: https://api.deepseek.com/v1/chat/completions
  model: deepseek-chat
  max-tokens: 1000
  temperature: 0.7
  timeout: 30000  # 30秒

# 日志配置
logging:
  level:
    com.campus.qa: debug
    org.springframework.security: debug
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'

